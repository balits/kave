version: "2"
run:
  go: "1.26"
linters:
  exclusions:
   rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
  settings:
      staticcheck:
        checks:
          - "-QF1008" # Disable the "could remove embedded field" check
formatters:
  enable:
    - gofmt
    - goimports