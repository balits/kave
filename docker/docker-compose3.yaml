services:
  node1:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    command:
      [
        "--nodeid", "node1",
        "--config", "/config/clusterConfig.json"
      ]
    ports:
      - "8001:8000"
    networks: ["raftnetwork"]
    volumes:
      - node1data:/data
      - ../config/clusterConfig3.json:/config/clusterConfig.json

  node2:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    command:
      [
        "--nodeid", "node2",
        "--config", "/config/clusterConfig.json"
      ]
    ports:
      - "8002:8000"
    networks: ["raftnetwork"]
    volumes:
      - node2data:/data
      - ../config/clusterConfig3.json:/config/clusterConfig.json

  node3:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    command:
      [
        "--nodeid", "node3",
        "--config", "/config/clusterConfig.json"
      ]
    ports:
      - "8003:8000"
    networks: ["raftnetwork"]
    volumes:
      - node3data:/data
      - ../config/clusterConfig3.json:/config/clusterConfig.json

networks:
  raftnetwork:

volumes:
  node1data:
  node2data:
  node3data: