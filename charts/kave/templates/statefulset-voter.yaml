# 1) Stable DNS name:
#    kave-voter-0.kave-headless.<namespace>.svc.cluster.local#

# 2) Stable storage
#   each pods PVC is reattached the same pod after restarts#

# 3) Ordered startup (podManagementPolicy: OrderedReady):
#   pods start one at 0 -> 1 -> 2 so pod 0 bootstraps
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kave.name" . }}-voter
  labels:
    {{- include "kave.labels" . | nindent 4 }}
    kave/role: voter
spec:
  serviceName: {{ .Values.serviceConfig.headlessService.name }}
  replicas: {{ .Values.voters.replicas }}
  # podManagementPolicy: OrderedReady
  podManagementPolicy: Parallel # needed otherwise kave-voter-0 will not see any other nodes during peer discovery
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kave.name" . }}
      kave/role: voter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kave.name" . }}
        kave/role: voter
    spec:
      terminationGracePeriodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: {{ include "kave.name" . }}-config
        - name: raft-tls
          secret:
            secretName: {{ include "kave.name" . }}-raft-tls
      containers:
        - name: kave
          image: {{ include "kave.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "/kave"
            - "--config=/config/clusterConfig.json"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_FQDN
              value: $(POD_NAME).{{ .Values.serviceConfig.headlessService.name }}.$(POD_NAMESPACE).svc.cluster.local
            - name: RAFT_PORT
              value: {{ .Values.ports.raft | quote }}
            - name: HTTP_PORT
              value: {{ .Values.ports.http | quote }}
            - name: NODE_ROLE
              value: voter
            - name: ADMIN_TOKEN
              valueFrom:
                secretRef:
                  name: kave-admin-token
                  key: token
          ports:
            - name: raft
              containerPort: {{ .Values.ports.raft }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.ports.http }}
              protocol: TCP
          volumeMounts:
            - name: kave-data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
            - name: raft-tls
              mountPath: /tls/raft
              readOnly: true
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: {{ .Values.healthcheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.liveness.periodSeconds }}
            failureThreshold: {{ .Values.healthcheck.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: {{ .Values.healthcheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.readiness.periodSeconds }}
            failureThreshold: {{ .Values.healthcheck.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      initContainers:
        - name: wait-for-dns
          image: busybox:1.36
          # Why this exists:
          #  With podManagementPolicy: Parallel all three pods race to start.
          #  The pod that wins the race and starts its Raft process first will
          #  immediately try to send heartbeats to peers whose DNS A-records
          #  don't exist in CoreDNS yet (CoreDNS propagation across physical
          #  k3s nodes is not instantaneous). This causes "no such host" DNS
          #  errors, failed heartbeats, spurious leader stepdowns, and a cascade
          #  of unnecessary re-elections (visible as rapidly incrementing terms).
          #
          # What this does:
          #  voter-0 is the bootstrap anchor — it starts unconditionally since
          #  all other pods wait for it, so waiting for a peer ourselves would
          #  be a circular dependency.
          #
          #  voter-1 and voter-2 wait until:
          #    1. voter-0's DNS A-record is resolvable  (nslookup)
          #    2. voter-0's Raft port is accepting TCP connections  (nc -z)
          #  Both checks must pass before the main container is allowed to start.
          #  This guarantees that by the time any non-zero pod starts its Raft
          #  process, voter-0 is already up and reachable, so the first real
          #  election succeeds immediately with quorum rather than timing out.
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - sh
            - -c
            - |
              HEADLESS="{{ .Values.serviceConfig.headlessService.name }}.{{ .Release.Namespace }}.svc.cluster.local"
              RAFT_PORT="{{ .Values.ports.raft }}"
 
              # Extract the numeric index from the pod name (e.g. kave-voter-1 -> 1)
              POD_INDEX=$(echo "$POD_NAME" | grep -o '[0-9]*$')
 
              if [ "$POD_INDEX" = "0" ]; then
                echo "Pod index 0: bootstrap anchor, skipping peer wait"
                exit 0
              fi
 
              TARGET="kave-voter-0.${HEADLESS}"
              echo "Pod index ${POD_INDEX}: waiting for ${TARGET}:${RAFT_PORT}..."
 
              # Step 1: wait for DNS resolution.
              # nslookup exits 0 as soon as CoreDNS returns a valid A-record.
              # Until then the pod stays in Init state and Kubernetes retries.
              until nslookup "$TARGET" > /dev/null 2>&1; do
                echo "  DNS not ready yet, retrying in 2s..."
                sleep 2
              done
              echo "  DNS resolved: ${TARGET}"
 
              # Step 2: wait for the TCP port to be open.
              # DNS resolving doesn't mean the process has bound to the port yet,
              # so this second check ensures the Raft listener is actually up.
              # nc -z does a connect-and-immediately-close (zero I/O).
              until nc -z "$TARGET" "$RAFT_PORT" 2>/dev/null; do
                echo "  TCP port not open yet, retrying in 2s..."
                sleep 2
              done
              echo "  TCP reachable: ${TARGET}:${RAFT_PORT} — proceeding"
  volumeClaimTemplates:
    - metadata:
        name: kave-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.storage.size }}
        {{- if .Values.storage.storageClassName }}
        storageClassName: {{ .Values.storage.storageClassName }}
        {{- end }}
---
# network policy for extra security over mTLS:
# only pods from this statefulset (kave voters)
# can initiate connections on the voters 7000 port
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kave.name" . }}-raft-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kave.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kave.name" . }}
      kave/role: voter

  policyTypes:
    - Ingress

  ingress:
    # http port needs to be accessible
    # from traefik + other pods.
    # protection should come from
    # ratelimiting + auth tokens (WIP)
    - ports:
        - protocol: TCP
          port: {{ .Values.ports.http }}
    # raft port should be protected,
    # only other pods other voters can access it
    - ports:
        - protocol: TCP
          port: {{ .Values.ports.raft }}
      from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "kave.name" . }}
              kave/role: voter