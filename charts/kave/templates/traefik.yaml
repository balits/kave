{{- if .Values.traefik.enabled -}}
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
    name: kave-ratelimiter
spec:
    # todo:   
    rateLimit:
        average: 2000
        burst: 1000
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
    name: {{ include "kave.name" . }}
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`kave.balits.net`)
      kind: Rule
      middlewares:
        - name: "kave-ratelimiter"
      services:
        - name: {{ .Values.serviceConfig.externalService.name }}
          port: 80
  tls:
    certResolver: letsencrypt
{{- end}}