{{- if .Values.traefik.enabled -}}
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
    name: kave-ratelimiter
spec:
    # above go rate limits, since
    # it would be a "last resort"
    rateLimit:
        average: 500
        burst: 1000
---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
    name: {{ include "kave.name" . }}
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`{{ .Values.kaveDomain }}`)
      kind: Rule
      middlewares:
        - name: "kave-ratelimiter"
      services:
        - name: {{ .Values.serviceConfig.externalService.name }}
          port: 80
  tls:
    # since cert-manager sets this secret, no certResolver is needed
    secretName: {{ .Values.tls.publicTlsName }}
{{- end}}