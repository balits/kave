services:
  node1:
    image: kave:latest
    command: "--config=/config/clusterConfig.json"
    ports:
      - "8001:8000"
    networks: ["raftnetwork"]
    volumes:
      - node1_volume:/data
      - ./config/clusterConfig1.json:/config/clusterConfig.json
    environment:
      - NODE_ID=node1
      - RAFT_PORT=7000
      - HTTP_PORT=8000
      - BOOTSTRAP=TRUE
      - PUBLIC_HTTP_HOST=localhost

