name: Smoke test for the Kubernetes cluster
description: |
  Spins up a kind cluster and asserts that the cluster forms, pods start up without issue,
  quorum forms and leader is elected, killing (and the k8s restart of) a leader eventually
  elects a new leader, rolling updates are working as expected.

inputs:
  app_name:
    description: name of the cluster, namespace etc (wherever we would use "kave", which it also defaults to)
    default: "kave"
  image_registry:
    description: name of the container registry
    default: "ghcr.io"
    required: true
  image_repo:
    description: name of the image repository
    default: "balits/kave"
    required: true
  image_tag:
    description: tag of the image
    default: "latest"
    required: true
  github_token:
    description: secret github token
    required: true

runs:
  using: composite
  steps:
    - name: Verify kubectl is installed
      shell: bash
      run: kubectl version --client

    - name: Install Kind
      shell: bash
      run: |
        KIND_VERSION=v0.31.0
        curl -sSLo /usr/local/bin/kind \
          "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
        chmod +x /usr/local/bin/kind
        kind version
    
    - name: Install Helm
      shell: bash
      run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    # this should set KUBECONFIG
    - name: Create Kind cluster
      shell: bash
      run: kind create cluster --name ${{ inputs.app_name }}
  
    # so we can pull image in next step(s)
    - name: Log in to GHCR
      shell: bash
      run: |
        echo "${{ inputs.github_token }}" | docker login ${{ inputs.image_registry }} \
          -u ${{ github.actor }} --password-stdin
  
    - name: Pull and load image into kind
      shell: bash
      run: |
        IMAGE=${{ inputs.image_registry }}/${{ inputs.image_repo }}:${{ inputs.image_tag }}
        docker pull $IMAGE; \
        kind load docker-image $IMAGE --name ${{ inputs.app_name }}

    - name: Install Helm Chart
      shell: bash
      run: |
        helm upgrade --install ${{ inputs.app_name }} ./charts/kave \
          --namespace ${{ inputs.app_name }} \
          --create-namespace \
          --set image.pullPolicy=Never \
          --set image.registry=${{ inputs.image_registry }} \
          --set image.repository=${{ inputs.image_repo }} \
          --set image.tag=${{ inputs.image_tag }} \
          --set config.ratelimiter.read.rps=5000 \
          --set config.ratelimiter.read.burst=5000 \
          --set config.ratelimiter.write.rps=5000 \
          --set config.ratelimiter.write.burst=5000 \
          --set voters.replicas=3 \
          --wait \
          --timeout=3m

    - name: Export kind kubeconfig
      shell: bash
      run: |
        KUBECONFIG_PATH=/tmp/kind-kubeconfig-${{ inputs.app_name }}.yaml
        kind get kubeconfig --name ${{ inputs.app_name }} > $KUBECONFIG_PATH

    - name: Run smoke tests
      shell: bash
      run: |
        KUBECONFIG_PATH=/tmp/kind-kubeconfig-${{ inputs.app_name }}.yaml

        (while true; do
          kubectl port-forward svc/${{ inputs.app_name }}-external 8080:80 \
            --namespace ${{ inputs.app_name }} \
            --kubeconfig "$KUBECONFIG_PATH" > /dev/null 2>&1
          sleep 1
        done) &
        LOOP_PID=$!
        sleep 5

        KUBECONFIG="$KUBECONFIG_PATH" \
        NAMESPACE=${{ inputs.app_name }} \
        CLUSTER_SIZE=3 \
        URL=http://localhost:8080 \
        go test ./test/smoke/... -v -count=1 --timeout 5m
        TEST_RESULT=$?

        kill -9 $LOOP_PID 2>/dev/null || true
        exit $TEST_RESULT
      
    - name: Dump pod logs on failure
      if: failure()
      shell: bash
      run: |
        KUBECONFIG_PATH=/tmp/kind-kubeconfig-${{ inputs.app_name }}.yaml \
        kubectl get pods -n ${{ inputs.app_name }} \
          --kubeconfig $KUBECONFIG_PATH
        
        for pod in $(kubectl get pods -n ${{ inputs.app_name }} \
            --kubeconfig $KUBECONFIG_PATH \
            -o jsonpath='{.items[*].metadata.name}'); do
          echo "===== logs for pod $pod ====="
          kubectl logs "$pod" -n ${{ inputs.app_name }} \
            --kubeconfig $KUBECONFIG_PATH \
            --tail=100 || true
        done


