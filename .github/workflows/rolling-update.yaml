name: Rolling update

# Rolling should happen on pushed/prs to main, the CI branch
# and additionaly as a manual dispatch
on:
  push:
    branches: ["main", "feature/ci"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Lint & run Unit and Ingegration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/unit-integ-test

  build-img:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test 
    permissions:
      contents: read
      packages: write
    # outputs:
    #   image_tag: ${{ steps.meta.outputs.version }} # do we need this here?
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-and-push-image
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
      
  smoke:
    name: Smoke test on kind cluster
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/smoke-test
        with:
          app_name: "kave"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          image_registry: ${{ env.REGISTRY }}
          image_repo: ${{ env.IMAGE_NAME }}
          image_tag: latest

  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: smoke
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy K8S to CIVO
        uses: "./github/actions/deploy-k8s-to-civo"
        with:
          kubeconfig_b64: ${{ secrets.KUBECONFIG_B64 }}

  extract-helm-config-values:
    name: Extract config values from the helm chart  
    runs-on: ubuntu-latest
    needs: deploy-k8s
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    outputs:
      kave_ot_slot_count: ${{ steps.extract-values.kave_ot_slot_count }}
      kave_ot_slot_size:  ${{ steps.extract-values.kave_ot_slot_size }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract values
        id: extract-values
        shell: bash
        run: |
          SLOT_COUNT=$(yq eval '.config.ot.slot_count' ./charts/kave/values.yaml)
          SLOT_SIZE=$(yq eval '.config.ot.slot_size' ./charts/kave/values.yaml)
          echo "kave_ot_slot_count=$SLOT_COUNT" >> $GITHUB_OUTPUT
          echo "kave_ot_slot_size=$SLOT_SIZE" >> $GITHUB_OUTPUT

  deploy-ui:
    name: Deploy UI to Github Pages
    runs-on: ubuntu-latest
    needs: extract-helm-config-values
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-ui.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/deploy-ui-to-gh-pages
        id: deploy-ui
        with:
          cluster_url: ${{ secrets.CIVO_CLUSTER_URL }}
          kave_ot_slot_size: ${{ needs.extract-helm-config-values.output.kave_ot_slot_size }}
          kave_ot_slot_count: ${{ needs.extract-helm-config-values.output.kave_ot_slot_count }}
