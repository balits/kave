name: Rolling update

# Rolling should happen on pushed/prs to main, the CI branch
# and additionaly as a manual dispatch
on:
  push:
    branches: ["main", "feature/ci"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Lint & run Unit and Ingegration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test 
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
    # outputs:
    #   image_tag: ${{ steps.meta.outputs.version }} # do we need this here?
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-and-push-image
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}
          image_name: ${{ env.IMAGE_NAME }}
      
  smoke:
    name: Smoke test on kind cluster
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/kind-smoke-test
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          image_registry: ${{ env.REGISTRY }}
          image_repo: ${{ env.IMAGE_NAME }}
          image_tag: latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Verify kubectl is installed
        shell: bash
        run: kubectl version --client

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - uses: ./.github/actions/set-kubeconfig
        with:
          kubeconfig_b64: ${{ secrets.KUBECONFIG_B64 }}

      - name: Upgrading helm chart
        run: make helm-upgrade-install
      
      - name: Wait until cluster is ready (statfulset pods are running + all nodes ready + quorom is formed)
        run: make wait-cluster-ready
