name: Go

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24.x']
    
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go v${{ matrix.go-version}}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      
      - name: Install dependencies
        run: go get .
      
      - name: Build
        run: go build -v ./...
      
      - name: Test
        run: go test ./...
        