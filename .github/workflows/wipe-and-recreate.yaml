name: Wipe and Recreate Cluster

on:
  # only wipe cluster if really really needed,
  # only through manual dispatch
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: ./.github/actions/test

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test 
    if:  github.event_name == 'workflow_dispatch' && (github.ref_name == 'main' || github.ref_name == 'feature/ci')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: ./.github/actions/build-and-push-image

  smoke:
    name: Smoke test on kind cluster
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event_name == 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'feature/ci')
    steps:
      - uses: ./.github/actions/kind-smoke-test

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'workflow_dispatch' && (github.ref_name == 'main' || github.ref_name == 'feature/ci') 
    steps:
      - uses: actions/checkout@v4

      # - name: Setup K8s + Helm
      - uses: ./.github/actions/setup-helm-and-k8s
        with:
          kubeconfig_b64: ${{ secrets.KUBECONFIG_B64 }}

      - name: Wipe cluster
        run: make wipe-recreate-cluster
      
      - name: Wait until cluster is ready (statfulset pods are running + all nodes ready + quorom is formed)
        run: make wait-cluster-ready