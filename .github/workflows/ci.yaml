name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # balits/kave

jobs:
  test:
    name: Lint & Unit tests & Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version-file: go.mod
          cache: true
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Unit Tests
        run: go test ./internal/... -race -count=1
      
      # - name: Integration tests
      #   run: go test ./tests/integration/... -race -count=1 -timeout=120s

  # lints & tests needs to pass to trigger this job
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test 
    if: github.event_name == 'push' && github.ref_name == 'main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up docker-buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # autoprovided

      - name: Extract Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag with short commit SHA (ghcr.io/balits/kave/:xyz123)
            type=sha,prefix=,format=short
            # + tag as latest
            type=raw,value=latest,enable=true
      
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Only runs on main after the image is pushed
  # Uses the commit SHA as the image tag
  deploy:
    name: Deplox to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      
      - name: Helm upgrade
        # --install creates the release if it doesn't exist (idempotent)
        # --wait blocks until all pods are ready or timeout is reached
        # --timeout how long to wait for pods to become ready
        run: |
          helm upgrade kave ./charts/kave \
            --install \
            --namespace kave \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status statefulset/kave-voter \
          --namespace kave ~
          --timeout=3m

      


