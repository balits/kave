name: CI

on:
  push:
    branches: ["main", "feature/ci"]
  pull_request:
    branches: ["main"]
  # after many empty ci pushes, use `gh workflow run` to fix civo cluster
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # This automatically pulls the version from your go.mod
          go-version-file: go.mod
          cache: true
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Unit Tests
        run: go test ./internal/... -race -count=1

      # integration tests

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test 
    # dont spam main with fix(ci): ..., instead squash commits on feature/ci and merge to main
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'feature/ci') 
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up docker-buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag with short commit SHA (ghcr.io/balits/kave/:xyz123)
            type=sha,prefix=,format=short
            # + tag as latest
            type=raw,value=latest,enable=true
      
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
      

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    # dont spam main with fix(ci): ..., instead squash commits on feature/ci and merge to main
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'feature/ci') 
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
      
      - name: Helm upgrade
        run: |
          helm upgrade kave ./charts/kave \
            --install \
            --namespace kave \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          # Removed the unnecessary '~' that was in your original script
          kubectl rollout status statefulset/kave-voter \
            --namespace kave \
            --timeout=3m